<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password - Safari Stays</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header class="bg-white shadow">
        <div class="container mx-auto flex justify-between items-center p-4">
            <h1 class="text-2xl font-bold text-[var(--secondary-color)]">Safari Stays</h1>
            <a href="login.html" class="btn-secondary">Back to login</a>
        </div>
    </header>

    <section class="login-container">
        <h2 class="text-2xl font-bold text-center mb-4 text-[var(--secondary-color)]">Set a new password</h2>
        <p class="text-center text-[var(--text-light)] mb-6">Choose a strong password (at least 8 characters).</p>

        <div id="reset-error" class="hidden mb-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2" role="alert"></div>
        <div id="reset-success" class="hidden mb-4 text-sm text-green-800 bg-green-50 border border-green-200 rounded px-3 py-2" role="status"></div>

        <form id="reset-form" class="space-y-4">
            <input type="hidden" id="reset-email">
            <input type="hidden" id="reset-token">
            <div>
                <label class="block text-sm font-medium mb-1">New password</label>
                <input type="password" id="reset-new" class="border rounded w-full p-2" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Confirm new password</label>
                <input type="password" id="reset-confirm" class="border rounded w-full p-2" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="btn-primary w-full" id="reset-submit">Update password</button>
        </form>
        <p class="text-center text-sm mt-4">
            <a href="login.html" class="text-[var(--primary-color)] font-semibold hover:underline">Return to login</a>
        </p>
    </section>

    <footer class="bg-brown text-white text-center p-4 mt-8">
        &copy; 2025 Safari Stays. All rights reserved.
    </footer>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const email = params.get('email');
            if (!token || !email) {
                document.getElementById('reset-error').textContent = 'Invalid or missing reset link. Use the link from the forgot-password page.';
                document.getElementById('reset-error').classList.remove('hidden');
                document.getElementById('reset-form').classList.add('opacity-50', 'pointer-events-none');
                return;
            }
            document.getElementById('reset-token').value = token;
            document.getElementById('reset-email').value = email;
        });

        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            const token = document.getElementById('reset-token').value;
            const newPassword = document.getElementById('reset-new').value;
            const confirm = document.getElementById('reset-confirm').value;
            const errEl = document.getElementById('reset-error');
            const okEl = document.getElementById('reset-success');

            errEl.classList.add('hidden');
            okEl.classList.add('hidden');

            if (newPassword !== confirm) {
                errEl.textContent = 'Passwords do not match.';
                errEl.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('reset-submit');
            btn.disabled = true;
            btn.textContent = 'Updating…';

            try {
                await SafariStaysAPI.auth.resetPassword(email, token, newPassword);
                okEl.textContent = 'Password updated. You can log in now.';
                okEl.classList.remove('hidden');
                setTimeout(function() {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                errEl.textContent = err.message || 'Could not reset password.';
                errEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update password';
            }
        });
    </script>
</body>
</html>
