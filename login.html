<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Safari Stays</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- HEADER -->
    <header class="bg-white shadow">
        <div class="container mx-auto flex justify-between items-center p-4">
            <h1 class="text-2xl font-bold text-[var(--secondary-color)]">Safari Stays</h1>
            <a href="index.html" class="btn-secondary">Back to Home</a>
        </div>
    </header>

    <!-- LOGIN CONTAINER -->
    <section class="login-container">
        <h2 class="text-2xl font-bold text-center mb-4 text-[var(--secondary-color)]">Welcome Back</h2>
        <p class="text-center text-[var(--text-light)] mb-6">Login to continue your adventure</p>

        <!-- Tabs -->
        <div class="flex border-b mb-6">
            <div id="bookerTab" class="tab-button tab-active" onclick="switchTab('booker')">
                <span>Guest</span>
                <small class="block text-xs text-gray-500 mt-1">Book accommodations</small>
            </div>
            <div id="hostTab" class="tab-button" onclick="switchTab('host')">
                <span>Host</span>
                <small class="block text-xs text-gray-500 mt-1">List your property</small>
            </div>
        </div>

        <!-- Booker Login Form -->
        <form id="bookerForm" class="space-y-4" novalidate>
            <div id="booker-login-error" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2" role="alert"></div>
            <div>
                <label class="block text-sm font-medium">Email</label>
                <input type="email" name="email" placeholder="you@example.com" class="border rounded w-full p-2 focus:ring focus:ring-[var(--accent-color)]" required autocomplete="email">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium">Password</label>
                    <a href="forgot-password.html?role=booker" class="text-xs text-[var(--primary-color)] hover:underline">Forgot password?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••" class="border rounded w-full p-2 focus:ring focus:ring-[var(--accent-color)]" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary w-full">Login as Guest</button>
        </form>

        <!-- Host Login Form -->
        <form id="hostForm" class="space-y-4 hidden" novalidate>
            <div id="host-login-error" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2" role="alert"></div>
            <div>
                <label class="block text-sm font-medium">Host Email</label>
                <input type="email" name="email" placeholder="host@safaristays.com" class="border rounded w-full p-2 focus:ring focus:ring-[var(--accent-color)]" required autocomplete="email">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium">Password</label>
                    <a href="forgot-password.html?role=host" class="text-xs text-[var(--primary-color)] hover:underline">Forgot password?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••" class="border rounded w-full p-2 focus:ring focus:ring-[var(--accent-color)]" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary w-full">Login as Host</button>
        </form>

        <p class="text-center text-sm mt-4">
            Don’t have an account? 
            <a href="signup.html" class="text-[var(--primary-color)] font-semibold hover:underline">Sign up</a>
        </p>
    </section>

    <!-- FOOTER -->
    <footer class="bg-brown text-white text-center p-4">
        &copy; 2025 Safari Stays. All rights reserved.
    </footer>

    <script src="api.js"></script>
    <script>
        function showLoginError(formId, message) {
            const id = formId === 'bookerForm' ? 'booker-login-error' : 'host-login-error';
            const el = document.getElementById(id);
            el.textContent = message;
            el.classList.remove('hidden');
        }

        function clearLoginErrors() {
            document.getElementById('booker-login-error').classList.add('hidden');
            document.getElementById('host-login-error').classList.add('hidden');
        }

        // Check server connection on page load
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const response = await fetch('http://localhost:3000/api/properties');
                if (!response.ok && response.status !== 404) {
                    console.warn('Server connection issue detected');
                }
            } catch (error) {
                console.error('Cannot connect to server:', error);
                const loginContainer = document.querySelector('.login-container');
                if (loginContainer) {
                    const warningDiv = document.createElement('div');
                    warningDiv.className = 'bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded mb-4';
                    warningDiv.innerHTML = '<strong>Note:</strong> Make sure the server is running on <code>http://localhost:3000</code>. Run <code>node server.js</code> in the terminal.';
                    loginContainer.insertBefore(warningDiv, loginContainer.firstChild);
                }
            }
        });

        // Switch between tabs
        function switchTab(role) {
            const bookerTab = document.getElementById('bookerTab');
            const hostTab = document.getElementById('hostTab');
            const bookerForm = document.getElementById('bookerForm');
            const hostForm = document.getElementById('hostForm');

            clearLoginErrors();

            if (role === 'booker') {
                bookerTab.classList.add('tab-active');
                hostTab.classList.remove('tab-active');
                bookerForm.classList.remove('hidden');
                hostForm.classList.add('hidden');
            } else {
                hostTab.classList.add('tab-active');
                bookerTab.classList.remove('tab-active');
                hostForm.classList.remove('hidden');
                bookerForm.classList.add('hidden');
            }
        }

        document.getElementById('bookerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearLoginErrors();
            const form = this;
            const emailInput = form.querySelector('input[type="email"]');
            const passwordInput = form.querySelector('input[type="password"]');
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const submitButton = form.querySelector('button[type="submit"]');

            if (!email || !password) {
                showLoginError('bookerForm', 'Please enter both email and password.');
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = 'Logging in...';

            try {
                const result = await SafariStaysAPI.auth.login(email, password, 'booker');
                if (result && result.token) {
                    window.location.href = 'index.html';
                } else {
                    throw new Error('No token received');
                }
            } catch (error) {
                console.error('Login error:', error);
                let msg = error.message || 'Invalid email or password. Please try again.';
                if (msg.startsWith('Login failed:')) {
                    msg = msg.replace(/^Login failed:\s*/i, '').trim();
                }
                showLoginError('bookerForm', msg);
                submitButton.disabled = false;
                submitButton.textContent = 'Login as Guest';
                passwordInput.value = '';
            }
        });

        document.getElementById('hostForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearLoginErrors();
            const form = this;
            const emailInput = form.querySelector('input[type="email"]');
            const passwordInput = form.querySelector('input[type="password"]');
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const submitButton = form.querySelector('button[type="submit"]');

            if (!email || !password) {
                showLoginError('hostForm', 'Please enter both email and password.');
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = 'Logging in...';

            try {
                const result = await SafariStaysAPI.auth.login(email, password, 'host');
                if (result && result.token) {
                    window.location.href = 'booking.html';
                } else {
                    throw new Error('No token received');
                }
            } catch (error) {
                console.error('Login error:', error);
                let msg = error.message || 'Invalid email or password. Please try again.';
                if (msg.startsWith('Login failed:')) {
                    msg = msg.replace(/^Login failed:\s*/i, '').trim();
                }
                showLoginError('hostForm', msg);
                submitButton.disabled = false;
                submitButton.textContent = 'Login as Host';
                passwordInput.value = '';
            }
        });
    </script>
</body>
</html>
