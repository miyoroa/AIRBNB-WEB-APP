<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password - Safari Stays</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header class="bg-white shadow">
        <div class="container mx-auto flex justify-between items-center p-4">
            <h1 class="text-2xl font-bold text-[var(--secondary-color)]">Safari Stays</h1>
            <a href="login.html" class="btn-secondary">Back to login</a>
        </div>
    </header>

    <section class="login-container">
        <h2 class="text-2xl font-bold text-center mb-4 text-[var(--secondary-color)]">Forgot password</h2>
        <p class="text-center text-[var(--text-light)] mb-6">Enter the email you use and choose your account type. We’ll give you a secure link to set a new password (demo: link shown on this page).</p>

        <div id="forgot-error" class="hidden mb-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2" role="alert"></div>
        <div id="forgot-success" class="hidden mb-4 text-sm text-green-800 bg-green-50 border border-green-200 rounded px-3 py-2" role="status"></div>

        <form id="forgot-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" id="forgot-email" class="border rounded w-full p-2" required placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Account type</label>
                <select id="forgot-role" class="border rounded w-full p-2">
                    <option value="booker">Guest (book accommodations)</option>
                    <option value="host">Host (list properties)</option>
                </select>
            </div>
            <button type="submit" class="btn-primary w-full" id="forgot-submit">Send reset link</button>
        </form>

        <p id="reset-link-wrap" class="hidden mt-4 text-center">
            <a id="reset-link" href="#" class="text-[var(--primary-color)] font-semibold underline break-all">Open password reset</a>
        </p>
    </section>

    <footer class="bg-brown text-white text-center p-4 mt-8">
        &copy; 2025 Safari Stays. All rights reserved.
    </footer>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role');
            if (role === 'host' || role === 'booker') {
                document.getElementById('forgot-role').value = role;
            }
        });

        function showForgotError(msg) {
            const el = document.getElementById('forgot-error');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('forgot-success').classList.add('hidden');
        }

        function showForgotSuccess(message, resetUrl) {
            document.getElementById('forgot-error').classList.add('hidden');
            const s = document.getElementById('forgot-success');
            s.textContent = message;
            s.classList.remove('hidden');
            const wrap = document.getElementById('reset-link-wrap');
            const link = document.getElementById('reset-link');
            if (resetUrl) {
                link.href = resetUrl;
                wrap.classList.remove('hidden');
            } else {
                wrap.classList.add('hidden');
            }
        }

        document.getElementById('forgot-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value.trim();
            const role = document.getElementById('forgot-role').value;
            const btn = document.getElementById('forgot-submit');
            btn.disabled = true;
            btn.textContent = 'Sending…';
            document.getElementById('forgot-error').classList.add('hidden');

            try {
                const data = await SafariStaysAPI.auth.requestPasswordReset(email, role);
                if (data.resetUrl) {
                    showForgotSuccess(data.message || 'Use the link below to set a new password.', data.resetUrl);
                } else {
                    showForgotSuccess(data.message || 'If an account exists, you can request another reset from the login page.', null);
                }
            } catch (err) {
                showForgotError(err.message || 'Something went wrong. Try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send reset link';
            }
        });
    </script>
</body>
</html>
